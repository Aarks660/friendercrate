<!DOCTYPE html>
<html>
<head>
    <title>Friendercrate Points Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body style="text-align: center; font-size: 20px;">
<header>
<h1 class="absolutecinema"><center>Friendercrate Points Calculator</center></h1>
<p style="text-align: center;">The Points Calculator, a dev tool for calculating points.</p>
</header>
<main>
<section id="points" class="card">
<table
    border="1"
    id="pointsTable"
    style="
        width: 80%;
        margin: auto;
        border-collapse: collapse;
        font-size: 20px;
        text-align: center;
    ">
    <thead>
        <tr>
            <th>Player</th>
            <th>Points</th>
            <th>Main</th>
            <th>Extended</th>
            <th>Legacy</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>
<script src="points.js"></script>
</section>
</main>
</body>
</html>
